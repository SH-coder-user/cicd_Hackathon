name: Deploy frontend (CRA → Nginx 8501)

on:
  push:
    branches: [ "main" ]
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "Dockerfile"
      - "nginx.conf"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker versions
        run: |
          docker version
          docker compose version || true

      - name: Build & Recreate
        run: |
          docker compose down || true
          # 최신 베이스 이미지 가져오기(선택): --pull
          docker compose build --pull --no-cache
          docker compose up -d
          docker ps

      - name: Smoke test (local)
        run: |
          curl -sf http://127.0.0.1:8501/healthz
