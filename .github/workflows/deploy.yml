name: Deploy to self-hosted Docker on push

on:
  push:
    branches: [ "main" ]
    paths:
      - "index.html"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: self-hosted  # 이 저장소에 등록한 러너가 실행
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker version
        run: |
          docker version
          docker compose version || true

      - name: Build & Recreate container
        run: |
          # 오래된 컨테이너/이미지 정리(옵션)
          docker compose down || true
          # 최신 빌드
          docker compose build --no-cache
          # 재배포
          docker compose up -d
          # 상태 출력
          docker ps

